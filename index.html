<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080c10" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="APEX" />
  <meta name="description" content="APEX — AI Day Trading Intelligence" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>APEX — Trading Intelligence</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff88;
      --green-dim: rgba(0,255,136,0.12);
      --green-border: rgba(0,255,136,0.2);
      --bg: #080c10;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.07);
      --text: #e0e0e0;
      --muted: #90a4ae;
      --dim: #546e7a;
      --mono: 'Space Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: rgba(8,12,16,0.97);
      border-bottom: 1px solid var(--green-border);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,180,255,0.15));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      border: 1px solid var(--green-border);
    }
    .logo-name { font-family: var(--mono); font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 3px; }
    .logo-sub { font-family: var(--mono); font-size: 9px; color: var(--green); letter-spacing: 2px; margin-top: 1px; }

    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: 2px;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 1.5s ease-in-out infinite;
    }

    /* API KEY BANNER */
    #api-banner {
      background: rgba(255,180,0,0.08);
      border-bottom: 1px solid rgba(255,180,0,0.2);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      z-index: 9;
    }
    #api-banner input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,180,0,0.3);
      border-radius: 8px;
      padding: 7px 12px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: var(--mono);
      outline: none;
      letter-spacing: 1px;
    }
    #api-banner input::placeholder { color: #546e7a; letter-spacing: 0; font-family: var(--sans); }
    #api-banner button {
      background: rgba(255,180,0,0.15);
      border: 1px solid rgba(255,180,0,0.3);
      border-radius: 8px;
      color: #ffb400;
      font-size: 12px;
      font-family: var(--mono);
      padding: 7px 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    #api-banner .banner-label {
      font-size: 11px; color: #ffb400; font-family: var(--mono);
      letter-spacing: 1px; white-space: nowrap;
    }

    /* MAIN AREA */
    main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      z-index: 2;
      -webkit-overflow-scrolling: touch;
    }

    /* WELCOME */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 32px 20px;
      text-align: center;
    }
    .welcome-title {
      font-family: var(--mono);
      font-size: clamp(32px, 8vw, 52px);
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .welcome-title span {
      background: linear-gradient(90deg, var(--green), #00b4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .welcome-sub-title {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--dim);
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    .welcome-desc {
      color: var(--dim);
      font-size: 14px;
      line-height: 1.7;
      max-width: 340px;
      margin-bottom: 36px;
    }
    .chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 32px;
    }
    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--dim);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .chip:active { background: var(--green-dim); border-color: var(--green-border); color: var(--text); }
    .disclaimer { color: #263238; font-size: 11px; max-width: 300px; line-height: 1.6; }

    /* MESSAGES */
    #messages {
      display: none;
      flex-direction: column;
      gap: 16px;
      padding: 20px 16px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
    }
    #messages.visible { display: flex; }

    .bubble-user {
      align-self: flex-end;
      background: var(--green-dim);
      border: 1px solid var(--green-border);
      border-radius: 16px 16px 4px 16px;
      padding: 12px 16px;
      max-width: 78%;
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
    }

    .bubble-ai {
      align-self: flex-start;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 14px 16px;
    }
    .bubble-ai-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0,255,136,0.08);
    }
    .ai-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--green);
      letter-spacing: 1.5px;
      background: rgba(0,255,136,0.07);
      border: 1px solid var(--green-border);
      border-radius: 4px;
      padding: 2px 8px;
    }
    .analyzing-label {
      font-family: var(--mono);
      font-size: 10px;
      color: #37474f;
      letter-spacing: 1px;
    }

    .msg-section-header {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--green);
      letter-spacing: 2px;
      margin-top: 14px;
      margin-bottom: 4px;
    }
    .msg-bullet { display: flex; gap: 8px; margin-bottom: 3px; }
    .msg-bullet-dot { color: var(--green); flex-shrink: 0; font-size: 14px; }
    .msg-bullet-text { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .msg-body { color: var(--muted); font-size: 13px; line-height: 1.7; margin-bottom: 2px; }

    /* TYPING DOTS */
    .typing-dots { display: flex; gap: 6px; align-items: center; padding: 6px 0; }
    .typing-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* INPUT BAR */
    footer {
      position: relative;
      z-index: 10;
      background: rgba(8,12,16,0.97);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; max-width: 760px; margin: 0 auto; }
    .input-wrap {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: rgba(0,255,136,0.35); }
    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: var(--sans);
      padding: 13px 0;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #chat-input::placeholder { color: #37474f; }
    #send-btn {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--green), #00c97a);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #080c10;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #send-btn:disabled { background: rgba(0,255,136,0.12); cursor: not-allowed; }
    #send-btn:active:not(:disabled) { transform: scale(0.95); }
    .footer-note {
      text-align: center;
      font-family: var(--mono);
      font-size: 9px;
      color: #1c2e35;
      letter-spacing: 1px;
      margin-top: 6px;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.4);opacity:1} }

    /* Scrollbar */
    main::-webkit-scrollbar { width: 3px; }
    main::-webkit-scrollbar-track { background: transparent; }
    main::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.2); border-radius: 4px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">📈</div>
      <div>
        <div class="logo-name">APEX</div>
        <div class="logo-sub">TRADING INTELLIGENCE</div>
      </div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
  </header>

  <!-- API Key Banner -->
  <div id="api-banner">
    <span class="banner-label">🔑 API KEY</span>
    <input type="password" id="api-key-input" placeholder="Paste your Anthropic API key to get started..." />
    <button onclick="saveKey()">SAVE</button>
  </div>

  <main id="main-scroll">
    <!-- Welcome Screen -->
    <div id="welcome">
      <div class="welcome-title">Meet <span>APEX</span></div>
      <div class="welcome-sub-title">AI DAY TRADING ANALYST</div>
      <p class="welcome-desc">Real-time technical analysis, trade setups, support & resistance levels — powered by AI.</p>
      <div class="chips">
        <button class="chip" onclick="sendSuggestion(this)">📊 Analyze NVDA today</button>
        <button class="chip" onclick="sendSuggestion(this)">🎯 TSLA support levels</button>
        <button class="chip" onclick="sendSuggestion(this)">₿ BTC next 4hr setup</button>
        <button class="chip" onclick="sendSuggestion(this)">📈 SPY scalping strategy</button>
        <button class="chip" onclick="sendSuggestion(this)">📉 AMD breakout or down?</button>
        <button class="chip" onclick="sendSuggestion(this)">💡 How to use VWAP</button>
      </div>
      <p class="disclaimer">⚠️ Not financial advice. Day trading involves substantial risk of loss.</p>
    </div>

    <!-- Messages -->
    <div id="messages"></div>
  </main>

  <footer>
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="chat-input" rows="1" placeholder="Ask about any stock, crypto, or trading setup..."></textarea>
      </div>
      <button id="send-btn" onclick="sendMessage()" disabled>→</button>
    </div>
    <div class="footer-note" id="footer-note" style="display:none">NOT FINANCIAL ADVICE · INFORMATIONAL USE ONLY</div>
  </footer>

  <script>
    const SYSTEM_PROMPT = `You are APEX — an elite AI day trading analyst with deep expertise in technical analysis, market microstructure, and price action. You help day traders make informed decisions with sharp, direct analysis.

When a user asks about a stock, crypto, or asset, provide:

📊 TECHNICAL ANALYSIS
- Key support & resistance levels (specific prices)
- Trend direction (intraday, short-term)
- Key indicators: RSI, MACD, moving averages (50/200 EMA), volume patterns
- Candlestick patterns if relevant

🎯 TRADE SETUP
- Bias: BULLISH / BEARISH / NEUTRAL
- Entry zone (specific price range)
- Stop loss level
- Price targets (T1, T2, T3)
- Risk/Reward ratio

⚠️ RISK FACTORS
- Key risks to the trade
- Important levels to watch
- Upcoming catalysts (earnings, news, data)

📈 MOMENTUM SIGNALS
- Short-term momentum reading
- Volume confirmation
- Any divergences

Keep responses sharp, specific, and actionable. Be direct like a professional desk analyst. Always note that markets are probabilistic, not certain.`;

    let messages = [];
    let apiKey = localStorage.getItem('apex_api_key') || '';
    let isLoading = false;

    // Init
    if (apiKey) {
      document.getElementById('api-key-input').value = apiKey;
      document.getElementById('api-banner').style.display = 'none';
      document.getElementById('send-btn').disabled = false;
    }

    function saveKey() {
      const key = document.getElementById('api-key-input').value.trim();
      if (!key) return alert('Please enter your API key.');
      apiKey = key;
      localStorage.setItem('apex_api_key', key);
      document.getElementById('api-banner').style.display = 'none';
      document.getElementById('send-btn').disabled = false;
    }

    // Auto-resize textarea
    const textarea = document.getElementById('chat-input');
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    });
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendSuggestion(btn) {
      sendMessage(btn.textContent.replace(/^[^\w]*/, '').trim());
    }

    async function sendMessage(text) {
      if (!apiKey) { document.getElementById('api-banner').style.display = 'flex'; return; }
      const userText = text || textarea.value.trim();
      if (!userText || isLoading) return;

      textarea.value = '';
      textarea.style.height = 'auto';

      // Show chat
      document.getElementById('welcome').style.display = 'none';
      const msgContainer = document.getElementById('messages');
      msgContainer.classList.add('visible');
      document.getElementById('footer-note').style.display = 'block';

      // Add user message
      messages.push({ role: 'user', content: userText });
      appendUserBubble(userText);

      // Add typing indicator
      const typingId = 'typing-' + Date.now();
      appendTypingBubble(typingId);

      isLoading = true;
      document.getElementById('send-btn').disabled = true;
      scrollBottom();

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages,
          }),
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        const reply = data.content.map(b => b.text || '').join('\n');
        messages.push({ role: 'assistant', content: reply });

        removeTyping(typingId);
        appendAIBubble(reply);
      } catch (err) {
        removeTyping(typingId);
        appendAIBubble('⚠️ Error: ' + (err.message || 'Network issue. Check your API key and connection.'));
      } finally {
        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        scrollBottom();
      }
    }

    function appendUserBubble(text) {
      const el = document.createElement('div');
      el.className = 'bubble-user';
      el.textContent = text;
      document.getElementById('messages').appendChild(el);
      scrollBottom();
    }

    function appendTypingBubble(id) {
      const el = document.createElement('div');
      el.className = 'bubble-ai';
      el.id = id;
      el.innerHTML = `
        <div class="bubble-ai-header">
          <span class="ai-badge">APEX ANALYSIS</span>
          <span class="analyzing-label">ANALYZING...</span>
        </div>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;
      document.getElementById('messages').appendChild(el);
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function appendAIBubble(text) {
      const el = document.createElement('div');
      el.className = 'bubble-ai';
      el.innerHTML = `<div class="bubble-ai-header"><span class="ai-badge">APEX ANALYSIS</span></div>` + formatText(text);
      document.getElementById('messages').appendChild(el);
      scrollBottom();
    }

    function formatText(text) {
      return text.split('\n').map(line => {
        if (!line.trim()) return '<div style="height:6px"></div>';
        if (/^[📊🎯⚠️📈💡]/.test(line) || /^[A-Z\s]{5,}$/.test(line.trim())) {
          return `<div class="msg-section-header">${line.replace(/\*\*/g, '')}</div>`;
        }
        if (line.trim().startsWith('- ') || line.trim().startsWith('• ')) {
          const content = line.trim().slice(2).replace(/\*\*(.*?)\*\*/g, '<strong style="color:#e0e0e0">$1</strong>');
          return `<div class="msg-bullet"><span class="msg-bullet-dot">›</span><span class="msg-bullet-text">${content}</span></div>`;
        }
        const formatted = line.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#e0e0e0">$1</strong>');
        return `<div class="msg-body">${formatted}</div>`;
      }).join('');
    }

    function scrollBottom() {
      const main = document.getElementById('main-scroll');
      setTimeout(() => main.scrollTo({ top: main.scrollHeight, behavior: 'smooth' }), 100);
    }

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
